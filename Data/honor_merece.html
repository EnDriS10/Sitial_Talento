    "nombre": "Dr. Álvaro Reynoso Valdés",
    "nombreArticulo": "Álvaro Reynoso Valdés",
    "subtituloArticulo": "Dr. en Ciencias · Universidad de París · Premio Academia de Ciencias de París, 1854",
    "descripcionCorta": "Alquízar, La Habana, 1829. Doctor en Ciencias por la Universidad de París (1856). Autor del célebre 'Ensayo sobre el cultivo de la caña de azúcar' (1862). Premio de Medicina y Cirugía de la Academia de Ciencias de París. Padre de la Agricultura Científica en Cuba.",
    "paragrafos": [
      "Álvaro Reynoso Valdés nació en Alquízar, antigua provincia de La Habana, el 4 de noviembre de 1829, en el seno de una familia acomodada de hacendados cafetaleros. Desde joven mostró una inclinación natural por las ciencias, influido por el interés de su padre y de su tío abuelo en la botánica y la agronomía experimental. Cursó sus primeros estudios en Cuba y comenzó la carrera de medicina en la Universidad de La Habana, pero su verdadera vocación lo llevó a abandonarla para dedicarse por completo a la química y la botánica.",
      "En 1848 viajó a París, donde se formó en química con prestigiosos profesores y trabajó en el laboratorio de bioquímica de Théophile-Jules Pelouze, discípulo del alemán Justus von Liebig, iniciador de la agroquímica. En la capital francesa realizó investigaciones fundamentales en química fisiológica, incluyendo un novedoso estudio sobre la diabetes mellitus y otro sobre la presencia de sangre en la orina de personas sometidas a anestesia, trabajo que le valió el premio de Medicina y Cirugía de la Academia de Ciencias de París en 1854. En 1856 obtuvo el título de Doctor en Ciencias por la Universidad de París y, para entonces, ya había publicado unos veinte trabajos científicos en revistas especializadas de Francia y España.",
      "Tras una estancia en Madrid, donde se interesó por la cría artificial de peces de agua dulce y fue nombrado profesor de la Universidad Central, Reynoso regresó a Cuba en 1858. Trajo consigo un laboratorio equipado con los más modernos instrumentos, una valiosa colección mineralógica y una notable biblioteca científica. Asumió la Cátedra de Química Aplicada a la Agricultura y la Botánica en la Escuela General Preparatoria de La Habana y, al año siguiente, fue designado director del Instituto de Investigaciones Químicas de La Habana, sucediendo al renombrado químico español José Luis Casaseca. Bajo su dirección, este instituto se convirtió en una de las primeras estaciones agronómicas del mundo.",
      "La obra cumbre de Reynoso vio la luz en 1862, cuando publicó en La Habana su célebre \"Ensayo sobre el cultivo de la caña de azúcar\". En esta obra, fruto de años de investigación y de la inversión de su propia fortuna, Reynoso propuso un sistema integral de medidas agrotécnicas para el cultivo intensivo de la caña, basado en el estudio de las condiciones físicas y químicas de los suelos, la selección de nuevas variedades, el empleo de fertilizantes y la irrigación. Su tesis fundamental era que la verdadera fábrica de azúcar está en los cañaverales. El libro fue traducido a varios idiomas y sus recomendaciones fueron aplicadas con éxito en Java, entonces colonia de Holanda, aunque en Cuba no encontraron el respaldo necesario para su implementación práctica.",
      "Entre 1864 y 1883 residió nuevamente en París, donde intentó desarrollar un procedimiento novedoso para obtener azúcar en frío mediante la congelación del jugo de caña. El fracaso de este experimento, sumado a la disolución del Instituto de Investigaciones Químicas en 1869, lo llevó a permanecer en la capital francesa durante casi dos décadas, dedicándose a diversos estudios de aplicación industrial. A su regreso definitivo a Cuba en 1883, decepcionado por la falta de apoyo gubernamental, improvisó un campo de experimentación en el traspatio de su casa en el barrio habanero de El Cerro. Allí pasó sus últimos cinco años realizando investigaciones sobre caña de azúcar, café, cacao, algodón, tabaco y otros cultivos, cuyos resultados divulgó en la sección científica del Diario de la Marina, del cual fue redactor.",
      "Miembro de la Academia de Ciencias de Cuba, de la Sociedad Económica de Amigos del País y correspondiente de varias academias europeas, Reynoso fue un incansable defensor de la diversificación agrícola y de la necesidad de reducir el monocultivo de la caña para propiciar la abolición gradual de la esclavitud. A pesar de haber sacrificado su fortuna personal en aras de la investigación científica, falleció en La Habana el 11 de agosto de 1888 en medio de la pobreza y el abandono. Sin embargo, sus valiosas investigaciones en química, fisiología, agronomía y tecnología industrial le han valido el reconocimiento póstumo como el \"Padre de la Agricultura Científica en Cuba\" y su legado lo ubica entre las figuras más preclaras de la ciencia cubana del siglo XIX."
    ]

    "paragrafos": [
      "Luis Alberto Montero Cabrera es Profesor Titular y Decano de la Facultad de Química de la Universidad de La Habana, cargo que ocupa desde 2024. Su vínculo con esa casa de altos estudios se remonta a 1965, cuando inició su carrera académica, y desde entonces ha desarrollado una trayectoria excepcional en la química computacional y teórica en Cuba.",
      "Montero Cabrera obtuvo el título de Licenciado en Química en 1968 y fue reconocido como el Graduado Más Destacado en Ciencias de la Universidad de La Habana. Posteriormente alcanzó el grado de Doctor rerum naturalium, Magna Cum Laude, por la Universidad Técnica de Dresde, Alemania, en 1980, y más tarde, en 2012, recibió el título de Doctor en Ciencias por la Universidad de La Habana.",
      "Su labor fundacional incluye haber sido uno de los creadores del Ministerio de Educación Superior de Cuba en 1976, así como asesor de política científica de los Ministerios de Educación y de Educación Superior entre 1969 y 1982. Dirigió el Laboratorio de Química Computacional y Teórica de la Facultad de Química desde su fundación en 1986 hasta 2024 y, desde 2001, es director del Centro Virtual de Bioinformática de la Universidad de La Habana. Presidió el Consejo Científico de la Universidad de La Habana entre 2005 y 2022 y actualmente integra el Consejo Nacional de Innovación desde 2023.",
      "Como investigador, Montero Cabrera ha publicado más de 200 artículos científicos, la gran mayoría en revistas internacionales de alto impacto. Es autor de un libro y editor de dos volúmenes. Ha presentado más de 160 ponencias en congresos especializados y ha participado en más de 200 eventos científicos, en más de la mitad de ellos como ponente invitado o principal. Su índice de Hirsch es de 26 según Google Scholar y ha dirigido 24 tesis doctorales concluidas.",
      "Su trabajo se ha centrado en la química computacional y teórica, la inteligencia artificial aplicada a problemas químicos, la espectroscopía UV-Vis y la programación científica para resolver problemas complejos en biología, medicina y ciencia de los materiales. Esta labor le ha valido numerosos reconocimientos, entre los que destacan el Premio Nacional de Química en 2018, la Orden \"Frank País\" de Primer Grado en 2013, la Orden \"Carlos J. Finlay\" en 1999 y el Premio de la Academia de Ciencias de Cuba en cinco ocasiones.",
      "En 2021 fue elegido miembro de la Asociación Americana para el Avance de la Ciencia (AAAS). Es Académico de Número de la Academia de Ciencias de Cuba desde 2006, Académico de Mérito desde 2017 y fue coordinador de la Sección de Ciencias Naturales y Exactas y miembro de su Junta Directiva entre 2012 y 2023. Presidió la Sociedad Cubana de Química de 2012 a 2016 y, desde 2018, es Presidente Honorario de esa sociedad, de la cual fue fundador, secretario ejecutivo y vicepresidente entre 1978 y 1997. Representó a Cuba en la División I (Química Física y Biofísica) de la IUPAC entre 2016 y 2018.",
      "Su proyección internacional incluye estancias de investigación y periodos sabáticos en más de quince países: Alemania (Universidad Técnica de Dresde, Universidad del Ruhr en Bochum, Universidad de Bremen, Universidad Friedrich Alexander de Erlangen-Núremberg), Reino Unido (The Royal Institution, Universidad de Oxford), Francia (Universidad Pierre y Marie Curie, Universidad de París-Saclay), Suiza (Escuela Politécnica Federal de Lausana), España (Universidad Autónoma de Madrid, Instituto de Estructura de la Materia del CSIC, Centro Internacional de Física Donostia), Estados Unidos (Universidades de Harvard, Johns Hopkins y Cornell), México (Universidad Nacional Autónoma de México), así como instituciones en Canadá, Colombia, Chile, Brasil, Nicaragua, China (Universidad de Pekín) y Sudáfrica.",

    "paragrafos": [
      "Julio Antonio Rodríguez Benítez nació en Camagüey en los primeros años de la Revolución. De joven destacó en el baloncesto, llegando a competir en primera categoría y acumulando cinco medallas nacionales. Sin embargo, ante la necesidad de consolidar una carrera profesional, optó por el estudio y cursó un técnico medio en Refrigeración, egresando con el primer expediente de su grupo. Al graduarse, contaba con una plaza en Dinamarca para especializarse en esa rama, pero respondió a un llamado nacional para cubrir la demanda de profesores de Ciencias Exactas. Habiendo obtenido resultados en concursos nacionales de Física, Química y Matemática, eligió esta última asignatura como primera opción; al estar casi cubiertas esas plazas, optó finalmente por Química, la especialidad con mayor déficit en ese momento.",
      "Comenzó a impartir la asignatura en el Politécnico de la Construcción Álvaro Barba Machado mientras cursaba, por la vía dirigida, la Licenciatura en Educación especialidad Química, de la que se graduó en 1986. Ese mismo año ingresó al IPVCE Máximo Gómez Báez de Camagüey tras aprobar las pruebas de aptitud y las clases demostrativas correspondientes. De inmediato fue seleccionado para un período de seis meses de formación avanzada en la Facultad de Superación en La Habana, con los mejores profesores del país, culminando con calificación de excelente en todas las asignaturas. Desde 1992 se incorporó de manera permanente al Centro Provincial de Entrenamiento para Concursos radicado en ese IPVCE.",
      "En 1995 pasó a integrar el Colectivo Nacional de Entrenadores, donde impartió Química General hasta aproximadamente 2020. A lo largo de esos 25 años participó como entrenador y jefe de delegación en ocho eventos internacionales, entre ellos Olimpiadas Centroamericanas y del Caribe e Iberoamericanas. Sus alumnos acumularon más de 300 medallas en concursos nacionales desde 1990 y 25 medallas internacionales. En el concurso nacional de 2015 sus diez estudiantes obtuvieron medallas —ocho de oro, una de plata y una de bronce—, y nueve de ellos clasificaron a la preselección nacional, un récord para la provincia de Camagüey. Entre sus alumnos se encuentran numerosos profesionales que posteriormente desarrollaron carreras destacadas en la ciencia, la investigación y la docencia, incluyendo doctores en ciencias, profesores universitarios e investigadores tanto en Cuba como en el extranjero. Jubilado pero reincorporado por la demanda de sus estudiantes, Julio continúa en el aula del IPVCE con la misma dedicación de siempre."

    "paragrafos": [
      "Rafael León Avendaño nació el 27 de marzo de 1919 en La Habana. Fue un destacado ingeniero químico, profesor y formador de generaciones de estudiantes cubanos vinculados al estudio de la química. Su trayectoria estuvo marcada por el trabajo docente, la investigación científica y la preparación académica de jóvenes talentos en Cuba. Inició su vida laboral como ayudante de laboratorio de química en el Instituto de Segunda Enseñanza de La Víbora, experiencia que despertó su vocación pedagógica. Más adelante ejerció como profesor en la Academia León Reguera, el Instituto Edison y el Colegio Marcelino Champagnat.",
      "Tras graduarse como ingeniero químico, consolidó una extensa carrera docente. Después de 1959, se incorporó como profesor de química en la Escuela de Química de la Universidad de La Habana, donde desempeñó funciones como jefe de cátedra y responsable de publicaciones de la Facultad de Ciencias. También participó en el Plan Emergente de Formación de Profesores de Secundaria Básica. Además, impartió docencia en el Instituto de Superación Educacional y en el Instituto Superior Pedagógico \"Enrique José Varona\", institución en la que integró el Consejo Científico y contribuyó al desarrollo de programas de estudio de química para los Institutos Superiores Pedagógicos. Publicó libros de texto, folletos y artículos científicos para facilitar el aprendizaje de esta ciencia. Su libro más famoso entre los mentores y estudiantes del siglo pasado es \"Química General\".",
      "Rafael León Avendaño también estuvo vinculado a la formación de estudiantes de alto rendimiento académico y al desarrollo de la preselección nacional cubana de química. Participó como profesor, tutor y miembro de tribunales científicos durante varios años, contribuyendo a la preparación de jóvenes que representarían a Cuba en competencias nacionales e internacionales, y fue mentor de la delegación cubana en la IChO de 1987. A decir de quienes lo conocían, enseñar era su gran pasión, especialmente trabajar con talentos. Por su destacada labor, recibió importantes reconocimientos, entre ellos la Orden Frank País de II Grado, la Medalla José Tey y el Premio de la Crítica Científico-Técnica, otorgado por el Instituto Cubano del Libro y la Academia de Ciencias de Cuba en 1992."
