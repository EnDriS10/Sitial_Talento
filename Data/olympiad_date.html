<!--
    olympiad_date.html
    ════════════════════════════════════════════════════════════════

    Campos:
      - lugar   (obligatorio): ciudad / sede que se muestra junto al título.
      - fecha   (obligatorio): fecha y hora de inicio de la IChO, formato
                                "YYYY-MM-DDTHH:MM:SS".
                                ⚠️ Esta hora se interpreta SIEMPRE en horario de
                                Europa Central (CET/CEST, zona "Europe/Madrid"),
                                sin importar dónde esté ni qué navegador use la
                                persona que visita la página. Así se evitan
                                confusiones por zona horaria del visitante.
      - anio    (obligatorio): año que se muestra en el título "IChO {anio}".

      - closingCeremonyFecha (OPCIONAL): fecha/hora de la ceremonia de
        clausura / anuncio de resultados, mismo formato y misma zona horaria
        (Europa Central, CET/CEST) que "fecha".
        Dejar como "" (cadena vacía) si aún no se sabe: en ese caso no se
        mostrará ningún contador de resultados.

      - closingCeremonyLink (OPCIONAL): enlace de YouTube del directo de la
        ceremonia de clausura. Dejar como "" si aún no hay enlace: en ese
        caso no se mostrará ninguna previsualización.

    Ambos campos opcionales pueden aparecer o no, independientemente uno
    del otro: puedes tener fecha sin enlace, enlace sin fecha, ambos, o
    ninguno.
    ════════════════════════════════════════════════════════════════
-->
