name: Generar páginas de compartir (previews de WhatsApp)

on:
  push:
    branches: [main]
    paths:
      - 'Assets/Media/**'
      - 'scripts/generar-paginas-compartir.js'
  workflow_dispatch: {}   # permite ejecutarlo manualmente desde la pestaña "Actions"

permissions:
  contents: write

jobs:
  generar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generar páginas en share/
        run: node scripts/generar-paginas-compartir.js

      - name: Confirmar y subir cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add share/
          if git diff --cached --quiet; then
            echo "Sin cambios en share/, nada que confirmar."
          else
            git commit -m "chore: actualizar páginas de compartir (share/)"
            git push
          fi
